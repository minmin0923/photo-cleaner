name: PhotoCleaner
options:
  bundleIdPrefix: com.brainvibe
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

targets:
  PhotoCleaner:
    type: application
    platform: iOS
    sources:
      - Sources
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: 사진정리
        NSPhotoLibraryUsageDescription: 중복 사진을 찾아 정리하기 위해 사진 보관함 접근이 필요합니다. 모든 분석은 기기 안에서만 이루어집니다.
        NSPhotoLibraryAddUsageDescription: 삭제 후보 사진을 앨범에 모으기 위해 필요합니다.
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.brainvibe.photocleaner
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.9"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
